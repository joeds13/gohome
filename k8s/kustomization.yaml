apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gohome

metadata:
  annotations:
    config.kubernetes.io/local-config: "true"
  name: gohome

# The monitoring/ component adds the ServiceMonitor and Grafana dashboard for Prometheus Operator.
# It is included here unconditionally; remove it if your cluster does not have the Prometheus Operator CRDs.
resources:
- rbac.yaml
- configmap.yaml
- deployment.yaml
- ingress.yaml
- service.yaml
- tsnet-pvc.yaml

# Don't include monitoing by default
# components:
#   - monitoring/

images:
- name: ghcr.io/joeds13/gohome
  newTag: "2026.17"

replicas:
- count: 1
  name: gohome

labels:
- includeSelectors: true
  pairs:
    app: gohome
    app.kubernetes.io/component: web
    app.kubernetes.io/name: gohome
    app.kubernetes.io/part-of: gohome
