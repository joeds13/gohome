name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: joeds13/gohome

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: |
          go mod download
          go test -v ./...
          go vet ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for platform in linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/gohome-${GOOS}-${GOARCH}"
            [ "$GOOS" = "windows" ] && output+=".exe"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}" \
              -o "$output" ./cmd/main.go
          done

          cd dist && sha256sum * > checksums.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.repository.pushed_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*

      - name: Update GitOps
        uses: joeds13/annover@10253f692c4c02f555e91b95f63613aa070459da # 2026.8
        with:
          repository: joeds13/turingpi_talos_cluster
          token: ${{ secrets.GITOPS_TOKEN }}
          image: ghcr.io/joeds13/gohome
          tag: ${{ github.ref_name }}
          file: gohome/kustomization.yaml
