name: Update GitOps

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

env:
  GITOPS_REPO: joeds13/turingpi_talos_cluster
  GITOPS_KUSTOMIZATION_PATH: gohome/kustomization.yaml

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Updating GitOps repo to ${VERSION}"

      - name: Checkout GitOps repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in GitOps repo
        run: |
          KUSTOMIZATION="gitops/${{ env.GITOPS_KUSTOMIZATION_PATH }}"
          VERSION="${{ steps.version.outputs.VERSION }}"

          if [ ! -f "${KUSTOMIZATION}" ]; then
            echo "Error: kustomization file not found at ${KUSTOMIZATION}"
            echo "Please update the GITOPS_KUSTOMIZATION_PATH env var in this workflow."
            exit 1
          fi

          echo "Updating resources ref to ${VERSION} in ${KUSTOMIZATION}"
          sed -i.bak "s|ref=[^\"'&]*|ref=${VERSION}|g" "${KUSTOMIZATION}"
          rm "${KUSTOMIZATION}.bak"

          echo "--- diff ---"
          git -C gitops diff

      - name: Commit and push GitOps change
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit — tag may already be up to date."
            exit 0
          fi

          git add "${{ env.GITOPS_KUSTOMIZATION_PATH }}"
          git commit -m "chore(gohome): bump image tag to ${{ steps.version.outputs.VERSION }}"
          git push
          echo "✓ GitOps repo updated to ${{ steps.version.outputs.VERSION }}"
