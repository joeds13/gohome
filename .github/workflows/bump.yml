name: Bump Version

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Bump version
        uses: joeds13/annover@71c2577e5605aa5a73050075e7996808ffe2e3b0 # 2026.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
